<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <mat-icon>flight_takeoff</mat-icon>
      <h1>JobPilot</h1>
      <p>Create your account</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Full Name</mat-label>
        <input matInput formControlName="name" placeholder="Rahul Sharma">
        <mat-icon matSuffix>person</mat-icon>
        <mat-error *ngIf="form.get('name')?.hasError('required')">Name is required</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email">
        <mat-icon matSuffix>email</mat-icon>
        <mat-error *ngIf="form.get('email')?.hasError('email')">Invalid email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('password')?.hasError('minlength')">Min 6 characters</mat-error>
      </mat-form-field>

      <button mat-raised-button color="primary" class="full-width submit-btn"
        type="submit" [disabled]="form.invalid || loading">
        <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        <span *ngIf="!loading">Create Account</span>
      </button>
    </form>

    <p class="auth-link">
      Already have an account? <a routerLink="/auth/login">Login</a>
    </p>
  </div>
</div>
