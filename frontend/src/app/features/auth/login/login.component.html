<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">
      <mat-icon>flight_takeoff</mat-icon>
      <h1>JobPilot</h1>
      <p>Your AI-Powered Job Tracker</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" placeholder="you@email.com">
        <mat-icon matSuffix>email</mat-icon>
        <mat-error *ngIf="form.get('email')?.hasError('required')">Email is required</mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">Invalid email</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput formControlName="password" [type]="hidePassword ? 'password' : 'text'">
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('password')?.hasError('required')">Password is required</mat-error>
      </mat-form-field>

      <button
        mat-raised-button color="primary"
        class="full-width submit-btn"
        type="submit"
        [disabled]="form.invalid || loading">
        <mat-spinner *ngIf="loading" diameter="20"></mat-spinner>
        <span *ngIf="!loading">Login</span>
      </button>
    </form>

    <button mat-stroked-button class="full-width demo-btn" (click)="fillDemo()">
      <mat-icon>play_circle</mat-icon> Try Demo Account
    </button>

    <p class="auth-link">
      Don't have an account? <a routerLink="/auth/register">Register</a>
    </p>
  </div>
</div>
