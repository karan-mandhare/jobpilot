server:
  port: ${PORT:8080}
  address: 0.0.0.0

spring:
  application:
    name: jobpilot

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:1}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT:30000}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:20000}

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

  mail:
    host: ${SPRING_MAIL_HOST:smtp.gmail.com}
    port: ${SPRING_MAIL_PORT:587}
    username: ${SPRING_MAIL_USERNAME}
    password: ${SPRING_MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

app:
  frontend-url: ${APP_FRONTEND_URL:https://jobpilot-7u4wak8d4-karan-mandhares-projects.vercel.app}

  jwt:
    secret: ${JWT_SECRET}
    expiration: ${JWT_EXPIRATION:86400000}

  ai:
    api-key: ${APP_AI_API_KEY:${OPENROUTER_API_KEY:}}
    api-url: ${APP_AI_API_URL:https://openrouter.ai/api/v1/chat/completions}
    model: ${APP_AI_MODEL:stepfun/step-3.5-flash:free}
    referer: ${APP_AI_REFERER:${APP_FRONTEND_URL:https://jobpilot-7u4wak8d4-karan-mandhares-projects.vercel.app/}}
    title: ${APP_AI_TITLE:JobPilot}

  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:}
    api-key: ${CLOUDINARY_API_KEY:}
    api-secret: ${CLOUDINARY_API_SECRET:}

logging:
  level:
    org.springframework.core.env: INFO
